spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/wicsdb
    username: wicsuser
    password: supersecretpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false