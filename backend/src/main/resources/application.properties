# I Reflect MVP Configuration
spring.application.name=ireflect-api

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ireflect}

# Server
server.port=8080

# JWT
ireflect.jwt.secret=${JWT_SECRET:dev-secret-change-in-production-min-32-chars-long}
ireflect.jwt.expiration-minutes=${JWT_EXP_MINUTES:120}

# CORS
ireflect.frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}

# Free plan limits
ireflect.plan.free.daily-refresh-limit=5
ireflect.plan.free.daily-session-limit=3